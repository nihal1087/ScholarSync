<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scholarship Guide</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="chat-container">

        <header class="header">
            <span class="status-dot" role="status" aria-label="Bot is Online"></span>
            <h1>Scholarship Guide</h1>
        </header>

        <section class="chat-box" id="chat-box" aria-live="polite" aria-relevant="additions">
            </section>

        <footer class="input-area">
            <label for="user-input" class="sr-only">Type your message</label>

            <input type="text" id="user-input" placeholder="Type..." autocomplete="off">

            <button id="send-btn" aria-label="Send message">
                <svg aria-hidden="true" viewBox="0 0 24 24" width="20" height="20" fill="white">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </footer>

    </main>

    <script src="script.js"></script>
</body>
</html>
